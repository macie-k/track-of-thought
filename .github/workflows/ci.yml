name: Build Cross-Platform Installers

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]
    tags:
      - 'v*'

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Run smoke test on Linux
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum ./gradlew run --args="--smoke-test"

      - name: Run smoke test on macOS
        if: runner.os == 'macOS'
        run: ./gradlew run --args="--smoke-test"

      - name: Run smoke test on Windows
        if: runner.os == 'Windows'
        run: .\gradlew.bat run --args="--smoke-test"
        shell: pwsh

      - name: Build native installer on Linux
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum ./gradlew clean jpackage

      - name: Build native installer on macOS
        if: runner.os == 'macOS'
        run: ./gradlew clean jpackage

      - name: Build native installer on Windows
        if: runner.os == 'Windows'
        run: .\gradlew.bat clean jpackage
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: build/jpackage/**
          if-no-files-found: error
